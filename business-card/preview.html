<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DawnriseCamp Business Card Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ece7dd;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        color: #173827;
      }

      main {
        width: min(1120px, calc(100vw - 40px));
        display: grid;
        gap: 22px;
        padding: 32px 0;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 24px;
        align-items: start;
      }

      figure {
        margin: 0;
      }

      img {
        width: 100%;
        display: block;
        background: white;
        box-shadow: 0 18px 40px rgba(16, 41, 29, .18);
      }

      figcaption {
        margin-top: 10px;
        font-size: 14px;
        font-weight: 700;
      }

      @media (max-width: 760px) {
        .cards {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="cards">
        <figure>
          <img src="dawnrisecamp-card-front.svg" alt="DawnriseCamp business card front">
          <figcaption>Front / 正面</figcaption>
        </figure>
        <figure>
          <img src="dawnrisecamp-card-back.svg" alt="DawnriseCamp business card back">
          <figcaption>Back / 背面</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
